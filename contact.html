<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 青岛仪软智汇</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 导航 -->
<header class="header">
    <div class="container">
        <div class="navbar">
            <div class="logo" data-zh="仪软智汇" data-en="Yiruan Intelligence">仪软智汇</div>
            <ul class="nav-menu">
                <li><a href="index.html" data-zh="首页" data-en="Home">首页</a></li>
                <li><a href="about.html" data-zh="关于我们" data-en="About">关于我们</a></li>
                <li><a href="products.html" data-zh="产品服务" data-en="Products">产品服务</a></li>
                <li><a href="solutions.html" data-zh="解决方案" data-en="Solutions">解决方案</a></li>
                <li><a href="contact.html" data-zh="联系我们" data-en="Contact">联系我们</a></li>
            </ul>
            <div class="lang-switch">
                <button data-lang="zh">中</button>
                <button data-lang="en">EN</button>
            </div>
        </div>
    </div>
</header>

<!-- 页面内容 -->
<section class="section contact">
    <div class="container">
        <h2 class="title" data-zh="联系我们" data-en="Contact Us">联系我们</h2>
        <div class="contact-content">
            <div class="contact-info">
                <p><strong data-zh="公司名称：" data-en="Company: "></strong><span data-zh="青岛仪软智汇科技有限公司" data-en="Qingdao Yiruan Intelligence Technology Co., Ltd.">青岛仪软智汇科技有限公司</span></p>
                <p><strong data-zh="公司地址：" data-en="Address: "></strong><span data-zh="山东省青岛市城阳区" data-en="Chengyang District, Qingdao, Shandong Province">山东省青岛市城阳区</span></p>
                <p><strong data-zh="联系电话：" data-en="Phone: "></strong><span data-zh="400-888-9999" data-en="400-888-9999">400-888-9999</span></p>
                <p><strong data-zh="电子邮箱：" data-en="Email: "></strong><span data-zh="contact@yiruan-intel.com" data-en="contact@yiruan-intel.com">contact@yiruan-intel.com</span></p>
                <p><strong data-zh="工作时间：" data-en="Working Hours: "></strong><span data-zh="周一至周五 9:00 - 18:00" data-en="Monday to Friday 9:00 - 18:00">周一至周五 9:00 - 18:00</span></p>
            </div>
            <div class="contact-form">
                <h3 data-zh="在线留言" data-en="Leave a Message">在线留言</h3>
                <form>
                    <input type="text" placeholder="您的姓名 / Your Name" required>
                    <input type="email" placeholder="您的邮箱 / Your Email" required>
                    <input type="tel" placeholder="您的电话 / Your Phone">
                    <textarea placeholder="请输入您的留言内容 / Please enter your message" rows="5" required></textarea>
                    <button type="submit" class="btn" data-zh="提交留言" data-en="Submit">提交留言</button>
                </form>
            </div>
        </div>
    </div>
</section>

<!-- 页脚 -->
<footer class="footer">

    </div>
</footer>
